<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A reversible blue sequin Codex pillow rendered in 3D with pointer-drawn flipped sequin patterns."
    />
    <meta name="theme-color" content="#f6f2e9" />
    <title>Codex Sequin Pillow</title>
    <link rel="icon" href="../codex-disco-render/assets/codex-icon.png" />
    <link rel="stylesheet" href="../codex-velvet-pillow/styles.css?v=sequin-static-studio-1" />
  </head>
  <body>
    <main id="app" aria-label="Interactive 3D blue reversible sequin pillow">
      <canvas id="scene" aria-label="Three dimensional blue reversible sequin pillow"></canvas>

      <div class="ui" aria-label="Pillow controls">
        <button
          id="reset-nap"
          class="icon-button"
          type="button"
          aria-label="Reset sequins"
          title="Reset sequins"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4a8 8 0 1 0 7.44 5.04l-1.85.77A6 6 0 1 1 16.23 7H13V5h7v7h-2V8.41A7.96 7.96 0 0 0 12 4z"></path>
          </svg>
        </button>
        <input
          id="brush-size"
          class="brush-size"
          type="range"
          min="34"
          max="118"
          value="72"
          step="1"
          aria-label="Brush width"
        />
      </div>
    </main>

    <script type="module" src="../codex-velvet-pillow/src/app.js?v=sequin-static-studio-1"></script>
  </body>
</html>
