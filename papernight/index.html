<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaperNight - PDF Dark Mode Converter</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./vendor/pdf-lib.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app" aria-labelledby="appTitle">
      <section class="panel">
        <h1 id="appTitle">PaperNight</h1>
        <p id="statusLine" class="status-line">Choose a PDF.</p>

        <input id="fileInput" class="file-input" type="file" accept="application/pdf,.pdf" />

        <div class="actions" aria-label="PDF conversion">
          <label class="button secondary" for="fileInput">Choose PDF</label>
          <button class="button primary" id="convertButton" type="button" disabled>
            Convert
          </button>
        </div>

        <p id="fileMeta" class="file-meta">No file selected</p>

        <div class="progress-shell" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </section>
    </main>
  </body>
</html>
